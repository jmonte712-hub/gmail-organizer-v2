services:
  n8n:
    image: n8nio/n8n:latest
    container_name: gmail-organizer-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Madrid
      - TZ=Europe/Madrid
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHON_CLASSIFIER_URL=http://python-classifier:5679
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows:ro
    depends_on:
      - python-classifier
    networks:
      - gmail-organizer-net

  python-classifier:
    build:
      context: ./python-classifier
      dockerfile: Dockerfile
    container_name: gmail-organizer-python
    restart: unless-stopped
    ports:
      - "5679:5679"
    environment:
      - FLASK_ENV=production
      - PORT=5679
    networks:
      - gmail-organizer-net

networks:
  gmail-organizer-net:
    driver: bridge

volumes:
  n8n_data:
    driver: local
